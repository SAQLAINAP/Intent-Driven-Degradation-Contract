name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Lint, Vet, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test (race detector)
        run: go test -race -coverprofile=coverage.out ./...

      - name: build dg binary
        run: go build ./cmd/dg

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

  integration:
    name: Integration Tests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: integration tests
        run: go test -tags=integration -timeout=120s ./pkg/...

  validate-example:
    name: Validate Example Policy
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: build dg
        run: go build -o dg ./cmd/dg
      - name: validate example policy
        run: ./dg validate config/example-degradation.yaml
